<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/index.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
    <script src="https://kit.fontawesome.com/9e90c990cd.js" crossorigin="anonymous"></script>

    <title>Login Webiware</title>
</head>
<body>

    <div class="container">
        <nav>
            <a href="index.html"><img src="../images/webiwarelogotipo.png" alt="Webiware" width="170px"></a>
        </nav>

        <div class="formularioLogin">
            <form id="formCadastro" action="../pages/perfil.html">
                <label for="user">Nome de Usuário</label>
                <br>
                <input type="text" name="user" id="user" class="campos form-control" required maxlength="17">
                <br>
                <label for="email">Email</label>
                <br>
                <input type="email" name="email" id="email" class="campos form-control" required>
                <br>
                <label for="senha">Senha</label>
                <br>
                <input type="password" name="senha" id="senha" class="campos form-control" required>
                <br>
                <br>
                <input type="submit" value="Finalizar Cadastro" class="finalizarCadastro">

                <p id="erro"></p>
            </form>

        </div>
    </div>

    <script src="../js/script.js"></script>
    
</body>
</html>
